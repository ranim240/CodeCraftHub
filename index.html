<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCraftHub - Learning Management Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #8B5CF6;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #8B5CF6, #F59E0B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
        }

        .form-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .form-section h2 {
            color: #8B5CF6;
            margin-bottom: 20px;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #8B5CF6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8B5CF6, #A855F7);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #F59E0B, #F97316);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #EF4444, #DC2626);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }

        .btn-secondary {
            background: #6B7280;
            color: white;
        }

        .btn-secondary:hover {
            background: #4B5563;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .courses-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .courses-section h2 {
            color: #8B5CF6;
            margin-bottom: 20px;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .course-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            border-color: #8B5CF6;
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .course-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .course-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-not-started {
            background: #FEF3C7;
            color: #92400E;
        }

        .status-in-progress {
            background: #DBEAFE;
            color: #1E40AF;
        }

        .status-completed {
            background: #D1FAE5;
            color: #065F46;
        }

        .course-description {
            color: #666;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .course-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #888;
        }

        .course-actions {
            display: flex;
            gap: 10px;
        }

        .course-actions .btn {
            padding: 8px 16px;
            font-size: 14px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #8B5CF6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
        }

        .message.success {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #10B981;
        }

        .message.error {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #EF4444;
        }

        .message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #8B5CF6;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #8B5CF6;
            font-size: 1.5rem;
        }

        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close:hover {
            color: #EF4444;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .courses-grid {
                grid-template-columns: 1fr;
            }

            .course-actions {
                flex-direction: column;
            }

            .modal-content {
                margin: 10% auto;
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>CodeCraftHub</h1>
            <p>Your Learning Management Platform</p>
        </div>

        <!-- Messages -->
        <div id="message" class="message"></div>

        <!-- Add Course Form -->
        <div class="form-section">
            <h2>Add New Course</h2>
            <form id="courseForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="courseName">Course Name *</label>
                        <input type="text" id="courseName" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="targetDate">Target Date *</label>
                        <input type="date" id="targetDate" name="target_date" required>
                    </div>
                    <div class="form-group">
                        <label for="courseStatus">Status *</label>
                        <select id="courseStatus" name="status" required>
                            <option value="">Select Status</option>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="courseDescription">Description *</label>
                    <textarea id="courseDescription" name="description" required placeholder="Enter course description..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span id="submitText">Add Course</span>
                    <span id="submitSpinner" class="loading-spinner" style="display: none;"></span>
                </button>
            </form>
        </div>

        <!-- Courses List -->
        <div class="courses-section">
            <h2>My Courses</h2>
            <div id="coursesContainer">
                <div class="loading-spinner" style="margin: 40px auto; display: block;"></div>
            </div>
        </div>
    </div>

    <!-- Edit Course Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Course</h3>
                <span class="close" id="closeModal">&times;</span>
            </div>
            <form id="editForm">
                <input type="hidden" id="editCourseId">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="editCourseName">Course Name *</label>
                        <input type="text" id="editCourseName" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="editTargetDate">Target Date *</label>
                        <input type="date" id="editTargetDate" name="target_date" required>
                    </div>
                    <div class="form-group">
                        <label for="editCourseStatus">Status *</label>
                        <select id="editCourseStatus" name="status" required>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="editCourseDescription">Description *</label>
                    <textarea id="editCourseDescription" name="description" required></textarea>
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" id="cancelEdit">Cancel</button>
                    <button type="submit" class="btn btn-success" id="updateBtn">
                        <span id="updateText">Update Course</span>
                        <span id="updateSpinner" class="loading-spinner" style="display: none;"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        class CourseManager {
            constructor() {
                this.baseURL = 'http://localhost:5000/api/courses';
                this.courses = [];
                this.editingCourseId = null;
                this.init();
            }

            init() {
                this.bindEvents();
                this.loadCourses();
            }

            bindEvents() {
                // Add course form
                document.getElementById('courseForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.addCourse();
                });

                // Edit course form
                document.getElementById('editForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.updateCourse();
                });

                // Modal events
                document.getElementById('closeModal').addEventListener('click', () => {
                    this.closeModal();
                });

                document.getElementById('cancelEdit').addEventListener('click', () => {
                    this.closeModal();
                });

                // Close modal when clicking outside
                document.getElementById('editModal').addEventListener('click', (e) => {
                    if (e.target.id === 'editModal') {
                        this.closeModal();
                    }
                });
            }

            async makeRequest(url, options = {}) {
                try {
                    const response = await fetch(url, {
                        headers: {
                            'Content-Type': 'application/json',
                            ...options.headers
                        },
                        ...options
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    return await response.json();
                } catch (error) {
                    console.error('API request failed:', error);
                    throw error;
                }
            }

            showMessage(message, type = 'success') {
                const messageEl = document.getElementById('message');
                messageEl.textContent = message;
                messageEl.className = `message ${type} show`;
                
                setTimeout(() => {
                    messageEl.classList.remove('show');
                }, 5000);
            }

            setLoading(elementId, isLoading, loadingText = '') {
                const textEl = document.getElementById(`${elementId}Text`);
                const spinnerEl = document.getElementById(`${elementId}Spinner`);
                const btnEl = document.getElementById(`${elementId}Btn`) || document.getElementById(elementId);

                if (isLoading) {
                    if (textEl) textEl.textContent = loadingText;
                    if (spinnerEl) spinnerEl.style.display = 'inline-block';
                    if (btnEl) btnEl.disabled = true;
                } else {
                    if (textEl) textEl.textContent = elementId === 'submit' ? 'Add Course' : 'Update Course';
                    if (spinnerEl) spinnerEl.style.display = 'none';
                    if (btnEl) btnEl.disabled = false;
                }
            }

            async loadCourses() {
                const container = document.getElementById('coursesContainer');
                
                try {
                    container.innerHTML = '<div class="loading-spinner" style="margin: 40px auto; display: block;"></div>';
                    
                    const courses = await this.makeRequest(this.baseURL);
                    this.courses = courses;
                    this.renderCourses();
                } catch (error) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3>Failed to load courses</h3>
                            <p>Please check if the API server is running on http://localhost:5000</p>
                            <button class="btn btn-primary" onclick="courseManager.loadCourses()">Retry</button>
                        </div>
                    `;
                    this.showMessage('Failed to load courses. Please check your API server.', 'error');
                }
            }

            renderCourses() {
                const container = document.getElementById('coursesContainer');
                
                if (this.courses.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3>No courses yet</h3>
                            <p>Add your first course using the form above!</p>
                        </div>
                    `;
                    return;
                }

                const coursesHTML = this.courses.map(course => `
                    <div class="course-card">
                        <div class="course-header">
                            <div>
                                <div class="course-title">${this.escapeHtml(course.name)}</div>
                                <div class="course-status status-${course.status.toLowerCase().replace(' ', '-')}">${course.status}</div>
                            </div>
                        </div>
                        <div class="course-description">${this.escapeHtml(course.description)}</div>
                        <div class="course-meta">
                            <span>Target: ${this.formatDate(course.target_date)}</span>
                            <span>Created: ${this.formatDate(course.created_at)}</span>
                        </div>
                        <div class="course-actions">
                            <button class="btn btn-success" onclick="courseManager.editCourse(${course.id})">
                                Edit
                            </button>
                            <button class="btn btn-danger" onclick="courseManager.deleteCourse(${course.id})">
                                Remove
                            </button>
                        </div>
                    </div>
                `).join('');

                container.innerHTML = `<div class="courses-grid">${coursesHTML}</div>`;
            }

            async addCourse() {
                const form = document.getElementById('courseForm');
                const formData = new FormData(form);
                
                const courseData = {
                    name: formData.get('name').trim(),
                    description: formData.get('description').trim(),
                    target_date: formData.get('target_date'),
                    status: formData.get('status')
                };

                // Validation
                if (!courseData.name || !courseData.description || !courseData.target_date || !courseData.status) {
                    this.showMessage('Please fill in all required fields.', 'error');
                    return;
                }

                this.setLoading('submit', true, 'Adding...');

                try {
                    const newCourse = await this.makeRequest(this.baseURL, {
                        method: 'POST',
                        body: JSON.stringify(courseData)
                    });

                    this.courses.unshift(newCourse);
                    this.renderCourses();
                    form.reset();
                    this.showMessage('Course added successfully!');
                } catch (error) {
                    this.showMessage('Failed to add course. Please try again.', 'error');
                } finally {
                    this.setLoading('submit', false);
                }
            }

            editCourse(courseId) {
                const course = this.courses.find(c => c.id === courseId);
                if (!course) return;

                this.editingCourseId = courseId;
                
                // Populate form
                document.getElementById('editCourseId').value = course.id;
                document.getElementById('editCourseName').value = course.name;
                document.getElementById('editCourseDescription').value = course.description;
                document.getElementById('editTargetDate').value = course.target_date;
                document.getElementById('editCourseStatus').value = course.status;

                // Show modal
                document.getElementById('editModal').style.display = 'block';
            }

            async updateCourse() {
                const form = document.getElementById('editForm');
                const formData = new FormData(form);
                
                const courseData = {
                    name: formData.get('name').trim(),
                    description: formData.get('description').trim(),
                    target_date: formData.get('target_date'),
                    status: formData.get('status')
                };

                // Validation
                if (!courseData.name || !courseData.description || !courseData.target_date || !courseData.status) {
                    this.showMessage('Please fill in all required fields.', 'error');
                    return;
                }

                this.setLoading('update', true, 'Updating...');

                try {
                    const updatedCourse = await this.makeRequest(`${this.baseURL}/${this.editingCourseId}`, {
                        method: 'PUT',
                        body: JSON.stringify(courseData)
                    });

                    // Update local courses array
                    const index = this.courses.findIndex(c => c.id === this.editingCourseId);
                    if (index !== -1) {
                        this.courses[index] = updatedCourse;
                    }

                    this.renderCourses();
                    this.closeModal();
                    this.showMessage('Course updated successfully!');
                } catch (error) {
                    this.showMessage('Failed to update course. Please try again.', 'error');
                } finally {
                    this.setLoading('update', false);
                }
            }

            async deleteCourse(courseId) {
                if (!confirm('Are you sure you want to delete this course? This action cannot be undone.')) {
                    return;
                }

                try {
                    await this.makeRequest(`${this.baseURL}/${courseId}`, {
                        method: 'DELETE'
                    });

                    this.courses = this.courses.filter(c => c.id !== courseId);
                    this.renderCourses();
                    this.showMessage('Course deleted successfully!');
                } catch (error) {
                    this.showMessage('Failed to delete course. Please try again.', 'error');
                }
            }

            closeModal() {
                document.getElementById('editModal').style.display = 'none';
                this.editingCourseId = null;
            }

            formatDate(dateString) {
                if (!dateString) return 'N/A';
                const date = new Date(dateString);
                return date.toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // Initialize the course manager
        const courseManager = new CourseManager();
    </script>
</body>
</html>
